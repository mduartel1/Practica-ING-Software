name: iOS Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-tests.yml"
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-tests.yml"

permissions:
  contents: read

jobs:
  unit-tests:
    name: AsistQR Unit Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available destinations
        run: xcodebuild -showdestinations -project ios/AsistQR/AsistQR.xcodeproj -scheme AsistQR

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project ios/AsistQR/AsistQR.xcodeproj \
            -scheme AsistQR \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -only-testing:AsistQRTests
